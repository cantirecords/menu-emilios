<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital - Emilio's</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: auto;
        }
        .menu-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px dashed #444;
            padding: 10px 0;
            font-size: 24px;
        }
        .price {
            color: #ffcc00;
            font-weight: bold;
        }
        h1 { color: #ff0000; font-size: 50px; text-transform: uppercase; }
    </style>
</head>
<body>

    <h1>Menú Emilio's</h1>
    <div class="menu-container" id="menu-board">
        <p>Cargando precios...</p>
    </div>

    <script>
        // PEGA AQUÍ TU ID DE GOOGLE SHEETS
        const SHEET_ID = 'Thttps://script.google.com/macros/s/AKfycbxec89QLxdwIL-pnT5QqRrnu3xKE9m8rnULb0xpl9wtCJr5lF0Tp9_LDc45hR512AEJ/exec';
        const SHEET_TITLE = 'Hoja 1'; // O el nombre que tenga tu pestaña
        const SHEET_RANGE = 'A2:B30';

        const FULL_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${SHEET_TITLE}&range=${SHEET_RANGE}`;

        async function loadMenu() {
            try {
                const res = await fetch(FULL_URL);
                const data = await res.text();
                const json = JSON.parse(data.substr(47).slice(0, -2));
                const rows = json.table.rows;
                
                let html = '';
                rows.forEach(row => {
                    if (row.c[0] && row.c[1]) {
                        html += `
                            <div class="menu-item">
                                <span>${row.c[0].v}</span>
                                <span class="price">${row.c[1].v}</span>
                            </div>`;
                    }
                });
                document.getElementById('menu-board').innerHTML = html;
            } catch (error) {
                console.error("Error cargando el menú:", error);
                document.getElementById('menu-board').innerHTML = "Error al conectar con los precios.";
            }
        }

        setInterval(loadMenu, 30000); // Se actualiza cada 30 segundos
        loadMenu();
    </script>
</body>
</html>
