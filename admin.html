<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Emilio's</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f4f9; margin: 0; padding: 0; color: #333; }
        
        /* PANTALLA DE LOGIN */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-box h2 { margin-top: 0; color: #E31837; font-weight: 800; }
        .login-box input { width: 100%; padding: 15px; font-size: 20px; text-align: center; border: 2px solid #ccc; border-radius: 10px; margin-bottom: 20px; letter-spacing: 5px; font-weight: bold; }
        .btn-main { background: #00843D; color: white; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-main:hover { background: #00602d; }
        
        /* PANEL DE ADMINISTRACIÓN */
        #admin-panel { display: none; max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; background: white; padding: 20px 40px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .header h1 { margin: 0; color: #E31837; font-weight: 800; }
        
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        @media(max-width: 800px) { .grid-layout { grid-template-columns: 1fr; } }
        
        .section-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-top: 8px solid #E31837; }
        .section-box.yellow { border-top-color: #e6d800; }
        .section-title { font-size: 24px; font-weight: 800; margin-top: 0; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
        .item-name { font-weight: 600; font-size: 18px; }
        .item-input { width: 120px; padding: 10px; border: 2px solid #ccc; border-radius: 8px; font-size: 16px; font-weight: bold; text-align: right; color: #00843D; }
        .item-input:focus { border-color: #E31837; outline: none; }
        
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 15px 30px; border-radius: 50px; font-weight: bold; display: none; z-index: 1001; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>Actualizar Precios</h2>
            <p>Emilio's Grocery Signage</p>
            <input type="password" id="pin-input" placeholder="PIN" maxlength="4">
            <button class="btn-main" onclick="checkPin()">ENTRAR</button>
            <p id="login-error" style="color: red; display: none; font-weight: bold;">PIN Incorrecto</p>
        </div>
    </div>

    <div id="admin-panel">
        <div class="header">
            <h1>Gestor de Menú Digital</h1>
            <button class="btn-main" style="width: auto;" onclick="savePrices()">GUARDAR TODOS LOS CAMBIOS</button>
        </div>

        <div class="grid-layout">
            <div class="section-box">
                <h2 class="section-title">Pantalla Izquierda (Estilos)</h2>
                <div id="estilos-list">Cargando precios...</div>
            </div>

            <div class="section-box yellow">
                <h2 class="section-title">Pantalla Derecha (Especialidades)</h2>
                <div id="especialidades-list">Cargando precios...</div>
            </div>
        </div>
    </div>

    <div id="toast">✅ Cambios guardados correctamente</div>

    <script>
        // Pega aquí la URL que obtuviste en el Paso 2 de Google Apps Script
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxec89QLxdwIL-pnT5QqRrnu3xKE9m8rnULb0xpl9wtCJr5lF0Tp9_LDc45hR512AEJ/exec"; 
        
        let sessionPin = "";
        let currentData = [];

        // Los IDs que van en cada columna visual
        const leftIds = ["Tacos", "Burritos", "Tortas", "Gorditas", "Sopes", "Quesadillas", "Huaraches", "Platillo", "Aguas"];
        const rightIds = ["Quesabirria (3)", "Chilaquiles", "Torta Cubana", "Pechuga Plancha", "Enchiladas (3)", "Flautas (4)", "Fajitas Mix", "Asada Plancha", "Molcajete", "Fajita Pollo", "Torta Milanesa", "Empanadas (3)"];

        function checkPin() {
            sessionPin = document.getElementById('pin-input').value;
            // Primero cargamos los datos para validar si hay conexión
            fetch(SCRIPT_URL)
                .then(res => res.json())
                .then(data => {
                    currentData = data;
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('admin-panel').style.display = 'block';
                    renderLists();
                }).catch(err => {
                    document.getElementById('login-error').innerText = "Error de conexión.";
                    document.getElementById('login-error').style.display = 'block';
                });
        }

        function renderLists() {
            const leftContainer = document.getElementById('estilos-list');
            const rightContainer = document.getElementById('especialidades-list');
            leftContainer.innerHTML = ''; rightContainer.innerHTML = '';

            currentData.forEach(item => {
                const html = `
                    <div class="item-row">
                        <span class="item-name">${item.id}</span>
                        <input type="text" class="item-input price-input" data-id="${item.id}" value="${item.precio}">
                    </div>`;
                
                if(leftIds.includes(item.id)) leftContainer.innerHTML += html;
                else if(rightIds.includes(item.id)) rightContainer.innerHTML += html;
            });
        }

        function savePrices() {
            const btn = document.querySelector('.header .btn-main');
            btn.innerText = "Guardando...";
            btn.style.background = "#666";

            const inputs = document.querySelectorAll('.price-input');
            const updates = [];
            inputs.forEach(input => {
                updates.push({ id: input.getAttribute('data-id'), precio: input.value });
            });

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ pin: sessionPin, updates: updates })
            })
            .then(res => res.json())
            .then(response => {
                btn.innerText = "GUARDAR TODOS LOS CAMBIOS";
                btn.style.background = "#00843D";
                
                if(response.success) {
                    showToast();
                } else {
                    alert("Error: " + response.error);
                    if(response.error === "PIN incorrecto") location.reload();
                }
            })
            .catch(err => alert("Error al guardar."));
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
