<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emilio's Grocery - Pick Your Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Poppins:wght@400;600;800;900&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            --img-size-left: 350px;
            --img-offset-y-left: 120px;
            --row-gap-left: 250px;
            --text-title: 32px;
            --text-price: 30px;
            --red-main: #E31837;
            --red-dark: #C1101D;
            --yellow-main: #FFF000;
            --green-main: #00843D;
            --white: #ffffff;
            --text-grey: #444444;
            --font-tang: 'DM Serif Display', serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }
        #preview-wrapper { transform-origin: top center; padding: 20px 0; }
        .screen {
            width: 1920px;
            height: 1080px;
            background-color: var(--red-main);
            position: relative;
            overflow: hidden;
            display: flex;
            box-shadow: 0 20px 80px rgba(0,0,0,0.8);
        }
        .bg-dots {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(var(--red-dark) 15%, transparent 16%);
            background-size: 25px 25px;
            z-index: 1;
        }
        .screen-left-content { width: 72%; height: 100%; position: relative; z-index: 2; padding: 40px; display: flex; flex-direction: column; }
        .screen-right-sidebar { width: 30%; height: 100%; background-color: var(--yellow-main); position: relative; z-index: 2; padding: 25px 35px; display: flex; flex-direction: column; align-items: center; box-shadow: -10px 0 30px rgba(0,0,0,0.2); }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; flex-shrink: 0; }
        .main-title { font-family: var(--font-tang); font-size: 75px; color: var(--white); text-shadow: 4px 4px 0px var(--red-dark); letter-spacing: 1px; line-height: 1; }
        .order-online-btn { background-color: var(--green-main); color: white; padding: 10px 25px; border-radius: 50px; font-size: 20px; font-weight: 800; text-transform: uppercase; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .papel-picado-border { width: 100%; height: 12px; background-image: linear-gradient(90deg, #FF007F 25%, #00E5FF 25%, #00E5FF 50%, #FFEA00 50%, #FFEA00 75%, #00E676 75%); background-size: 80px 100%; margin-bottom: 15px; border-radius: 10px; opacity: 0.9; flex-shrink: 0; }
        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 130px; }
        #grid-estilos { row-gap: var(--row-gap-left); }
        .food-card-wrapper { position: relative; display: flex; flex-direction: column; justify-content: flex-end; }
        .food-text-box { background: var(--white); border-radius: 25px; padding: 50px 12px 15px 12px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.3); min-height: 165px; display: flex; flex-direction: column; justify-content: flex-end; position: relative; z-index: 1; }
        .food-image { position: absolute; left: 50%; transform: translateX(-50%); object-fit: contain; filter: drop-shadow(0 15px 10px rgba(0,0,0,0.4)); z-index: 10; animation: superSlowFloat 15s ease-in-out infinite; }
        .food-card-title { font-family: 'Fredoka', sans-serif; font-size: var(--text-title); color: var(--red-main); line-height: 1; margin-bottom: 5px; font-weight: 700; }
        .food-card-sub { font-size: 14px; color: var(--text-grey); font-weight: 700; margin-bottom: 5px; min-height: 34px; line-height: 1.1; display: flex; align-items: center; justify-content: center; }
        .food-card-price { font-size: var(--text-price); font-weight: 900; color: var(--green-main); line-height: 1; }
        .logo-container img { width: 260px; object-fit: contain; margin-bottom: 15px; }
        .sidebar-title { font-family: var(--font-tang); font-size: 48px; color: var(--red-main); margin-bottom: 10px; text-align: center; line-height: 0.9; }
        .meat-box { background-color: var(--red-main); width: 100%; border-radius: 25px; padding: 20px; display: flex; flex-direction: column; gap: 6px; box-shadow: inset 0 -10px 20px rgba(0,0,0,0.2); margin-bottom: 15px; }
        .meat-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.15); padding-bottom: 4px; }
        .meat-name { color: var(--white); font-size: 20px; font-weight: 800; }
        .meat-sub { color: rgba(255,255,255,0.8); font-size: 12px; font-weight: 600; text-transform: uppercase; }
        .drinks-container { position: absolute; bottom: 20px; right: -200px; z-index: 10; display: flex; flex-direction: column; align-items: left; }
        .drinks-img { width: 500px; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.4)); animation: superSlowFloat 15s ease-in-out infinite; }
        .drinks-label { background: var(--green-main); color: white; font-size: 34px; font-weight: 900; padding: 8px 35px; border-radius: 50px; border: 4px solid white; margin-top: -45px; transform: rotate(-3deg); box-shadow: 0 10px 20px rgba(0,0,0,0.3); text-transform: uppercase; }
        @keyframes superSlowFloat { 0% { transform: translateX(-50%) translateY(0px); } 50% { transform: translateX(-50%) translateY(-5px); } 100% { transform: translateX(-50%) translateY(0px); } }

        /* Indicador de actualización */
        #update-indicator {
            position: fixed; bottom: 10px; left: 10px;
            background: rgba(0,0,0,0.6); color: #0f0;
            font-size: 11px; padding: 4px 10px; border-radius: 20px;
            font-family: monospace; z-index: 9999;
            opacity: 0; transition: opacity 1s;
        }
        #update-indicator.show { opacity: 1; }
    </style>
</head>
<body>
<div id="update-indicator">✓ Precios actualizados</div>
<div id="preview-wrapper">
    <div class="screen">
        <div class="bg-dots"></div>
        <div class="screen-left-content">
            <div class="header-row">
                <div class="main-title">PICK YOUR STYLE</div>
                <div class="order-online-btn"> EMILIOSGROCERY.COM</div>
            </div>
            <div class="papel-picado-border"></div>
            <div id="grid-estilos" class="grid-container"></div>
        </div>
        <div class="screen-right-sidebar">
            <div class="logo-container">
                <img src="https://emiliosgrocery.com/wp-content/uploads/2025/04/Emilios-Grocery-Logo.png" alt="Logo">
            </div>
            <div class="sidebar-title">PICK YOUR MEAT</div>
            <div class="meat-box" id="list-carnes"></div>
            <div class="drinks-container">
                <img src="https://i.postimg.cc/4N3NHMrm/DRINKS.png" class="drinks-img" alt="Bebidas">
                <div class="drinks-label">5 DÓLARES</div>
            </div>
        </div>
    </div>
</div>

<script>
    // ⚠️ REEMPLAZA ESTA URL CON TU URL DE APPS SCRIPT
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwO2rLqhIb9Wodhc17eSgjY6m6-b_Tphwbsbjziu3YiuP0csxtPl14PzKKiy_JW_wNssw/exec";

    const IMGS_ESTILOS = [
        "https://i.postimg.cc/fL53f5Vt/TACOS.png",
        "https://i.postimg.cc/SRDWjk6g/BURRITOS.png",
        "https://i.postimg.cc/1tMgrM8Z/TORTA-CUBANO.png",
        "https://i.postimg.cc/8cK6NwGw/GORDITAS.png",
        "https://i.postimg.cc/7L3JfqDh/SOPES.png",
        "https://i.postimg.cc/BvTPXJs3/QUESADILLAS.png",
        "https://i.postimg.cc/SQD86Q96/HUARACHES.png",
        "https://i.postimg.cc/cL8nGQbc/PLATILLO.png"
    ];

    async function loadPrices() {
        try {
            const res = await fetch(APPS_SCRIPT_URL + "?t=" + Date.now());
            const data = await res.json();

            // Renderizar Estilos
            const gEstilos = document.getElementById('grid-estilos');
            gEstilos.innerHTML = '';
            data.estilos.forEach((item, i) => {
                gEstilos.innerHTML += `
                    <div class="food-card-wrapper">
                        <img src="${IMGS_ESTILOS[i]}" class="food-image" style="width:var(--img-size-left);bottom:var(--img-offset-y-left);">
                        <div class="food-text-box">
                            <div class="food-card-title">${item.nombre}</div>
                            <div class="food-card-sub">${item.sub}</div>
                            <div class="food-card-price">${item.precio}</div>
                        </div>
                    </div>`;
            });

            // Renderizar Carnes
            const lCarnes = document.getElementById('list-carnes');
            lCarnes.innerHTML = '';
            data.carnes.forEach(item => {
                lCarnes.innerHTML += `
                    <div class="meat-row">
                        <span class="meat-name">${item.es}</span>
                        <span class="meat-sub">${item.en}</span>
                    </div>`;
            });

            // Mostrar indicador
            const ind = document.getElementById('update-indicator');
            ind.classList.add('show');
            setTimeout(() => ind.classList.remove('show'), 3000);

        } catch(e) {
            console.error("Error cargando precios:", e);
        }
    }

    function handleScale() {
        const wrapper = document.getElementById('preview-wrapper');
        const scale = window.innerWidth / 1960;
        wrapper.style.transform = `scale(${scale})`;
    }

    // Cargar al inicio y luego cada 30 segundos
    loadPrices();
    setInterval(loadPrices, 30000);

    window.onresize = handleScale;
    window.onload = handleScale;
</script>
</body>
</html>
