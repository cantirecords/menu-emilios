<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Emilio's Grocery - Pick Your Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red:#E31837; --red-dk:#C1101D; --yellow:#ffde59;
            --green:#00843D; --white:#ffffff; --grey:#3a3a3a;
            --ff:'Fredoka',sans-serif;
            --divider-w:10px; --divider-color:#ffffff;
            --card-radius:40px; --sidebar-bg:#ffde59; --sidebar-width:500px;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        html,body{width:100%;height:100%;overflow:hidden;background:var(--red);font-family:var(--ff);}
        #root{width:1920px;height:1080px;position:absolute;top:0;left:0;transform-origin:top left;display:flex;background:var(--red);overflow:hidden;}
        #root::before{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(0,0,0,0.18) 14%,transparent 15%);background-size:28px 28px;z-index:0;}
        .left{flex:1;height:100%;position:relative;z-index:1;padding:32px 44px 20px;display:flex;flex-direction:column;}
        .hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0;flex-shrink:0;}
        .title-block{display:flex;flex-direction:column;}
        .t-en{font-family:var(--ff);font-size:80px;font-weight:700;color:var(--white);line-height:1;text-shadow:5px 5px 0 var(--red-dk);}
        .title-gap{height:10px;}
        .t-es{font-family:var(--ff);font-size:34px;font-weight:600;color:var(--yellow);letter-spacing:2px;}
        .pill{background:var(--green);color:var(--white);font-family:var(--ff);font-size:22px;font-weight:700;padding:12px 28px;border-radius:50px;box-shadow:0 8px 20px rgba(0,0,0,0.3);margin-top:14px;white-space:nowrap;}
        .fiesta{height:0;border-radius:10px;background:repeating-linear-gradient(90deg,#FF007F 0 20px,#00E5FF 20px 40px,#ffde59 40px 60px,#00E676 60px 80px);flex-shrink:0;overflow:hidden;}
        .hdr-spacer{height:16px;flex-shrink:0;}
        .grid{display:grid;grid-template-columns:repeat(4,1fr);column-gap:20px;row-gap:210px;margin-top:165px;flex:1;}
        .card{position:relative;display:flex;flex-direction:column;justify-content:flex-end;}
        .card-box{background:var(--white);border-radius:var(--card-radius);padding:55px 14px 18px;text-align:center;box-shadow:0 20px 42px rgba(0,0,0,0.35);min-height:178px;display:flex;flex-direction:column;justify-content:flex-end;z-index:1;}
        .c-name{font-family:var(--ff);font-size:55px;font-weight:700;color:var(--red);line-height:1;margin-bottom:5px;}
        .c-sub{font-family:var(--ff);font-size:28px;font-weight:600;color:var(--grey);min-height:36px;line-height:1.15;display:flex;align-items:center;justify-content:center;margin-bottom:5px;}
        .c-price{font-family:var(--ff);font-size:50px;font-weight:700;color:var(--green);line-height:1;}
        .divider{width:var(--divider-w);height:100%;background:var(--divider-color);flex-shrink:0;z-index:2;box-shadow:0 0 20px rgba(255,255,255,0.2);}
        .right{width:var(--sidebar-width);height:100%;background:var(--sidebar-bg);position:relative;z-index:1;padding:26px 40px 20px;display:flex;flex-direction:column;align-items:center;}
        .logo{width:260px;object-fit:contain;margin-bottom:6px;}
        .s-en{font-family:var(--ff);font-size:60px;font-weight:700;color:var(--red);text-align:center;line-height:1;}
        .sidebar-title-gap{height:10px;flex-shrink:0;}
        .s-es{font-family:var(--ff);font-size:30px;font-weight:600;color:var(--red-dk);letter-spacing:1.5px;margin-bottom:16px;text-align:center;}
        .meat-box{background:var(--red);width:100%;border-radius:40px;padding:16px 22px;display:flex;flex-direction:column;gap:0;box-shadow:inset 0 -8px 20px rgba(0,0,0,0.2),0 8px 22px rgba(0,0,0,0.18);flex:1;}
        .m-row{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.13);padding:9px 0;}
        .m-row:last-child{border-bottom:none;}
        .m-name{color:var(--white);font-family:var(--ff);font-size:35px;font-weight:700;}
        .m-sub{color:rgba(255,255,255,0.75);font-family:var(--ff);font-size:25px;font-weight:600;text-transform:uppercase;}
        .sidebar-price-note{font-family:var(--ff);font-size:18px;color:var(--red-dk);text-align:center;margin-top:10px;font-style:italic;font-weight:600;flex-shrink:0;line-height:1.3;}
        #toast{position:fixed;bottom:22px;right:22px;background:var(--green);color:var(--white);font-family:var(--ff);font-size:16px;font-weight:700;padding:10px 22px;border-radius:40px;box-shadow:0 8px 24px rgba(0,0,0,0.4);opacity:0;transform:translateY(10px);transition:opacity .5s,transform .5s;pointer-events:none;z-index:9999;}
        #toast.show{opacity:1;transform:translateY(0);}
    </style>
</head>
<body>
<div id="toast">✓ Precios actualizados</div>
<div id="root">
    <div class="left">
        <div class="hdr">
            <div class="title-block">
                <div class="t-en" id="title-en">PICK YOUR STYLE</div>
                <div class="title-gap"></div>
                <div class="t-es" id="title-es">ELIGE TU ESTILO</div>
            </div>
            <div class="pill" id="website-pill">EMILIOSGROCERY.COM</div>
        </div>
        <div class="fiesta"></div>
        <div class="hdr-spacer"></div>
        <div class="grid" id="grid-estilos"></div>
    </div>
    <div class="divider"></div>
    <div class="right" id="sidebar">
        <img class="logo" src="https://emiliosgrocery.com/wp-content/uploads/2025/04/Emilios-Grocery-Logo.png" alt="Logo">
        <div class="s-en" id="meat-title-en">PICK YOUR<br>MEAT</div>
        <div class="sidebar-title-gap"></div>
        <div class="s-es" id="meat-title-es">ELIGE TU CARNE</div>
        <div class="meat-box" id="list-carnes"></div>
        <div class="sidebar-price-note">* Lengua &amp; Camar&oacute;n = market price<br>* Prices may change</div>
    </div>
</div>
<script>
const APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbwO2rLqhIb9Wodhc17eSgjY6m6-b_Tphwbsbjziu3YiuP0csxtPl14PzKKiy_JW_wNssw/exec";
const FALLBACK_IMGS=["https://i.postimg.cc/fL53f5Vt/TACOS.png","https://i.postimg.cc/SRDWjk6g/BURRITOS.png","https://i.postimg.cc/1tMgrM8Z/TORTA-CUBANO.png","https://i.postimg.cc/8cK6NwGw/GORDITAS.png","https://i.postimg.cc/7L3JfqDh/SOPES.png","https://i.postimg.cc/BvTPXJs3/QUESADILLAS.png","https://i.postimg.cc/SQD86Q96/HUARACHES.png","https://i.postimg.cc/cL8nGQbc/PLATILLO.png"];
const DEF_CFG=FALLBACK_IMGS.map(()=>({bottom:160,width:400,offsetX:0}));
let imgCfg=JSON.parse(localStorage.getItem('imgCfgP1')||'null')||DEF_CFG.map(c=>({...c}));
let initialized=false,lastKey='',lastCarnesKey='';

function scaleRoot(){const el=document.getElementById('root');const s=Math.min(window.innerWidth/1920,window.innerHeight/1080);el.style.transform=`scale(${s})`;el.style.left=((window.innerWidth-1920*s)/2)+'px';el.style.top=((window.innerHeight-1080*s)/2)+'px';document.body.style.background='#E31837';}
function applyLayout(cfg){if(!cfg)return;const r=document.documentElement.style;if(cfg.dividerW!==undefined)r.setProperty('--divider-w',cfg.dividerW+'px');if(cfg.dividerColor)r.setProperty('--divider-color',cfg.dividerColor);if(cfg.sidebarBg)r.setProperty('--sidebar-bg',cfg.sidebarBg);if(cfg.sidebarWidth!==undefined)r.setProperty('--sidebar-width',cfg.sidebarWidth+'px');if(cfg.redMain)r.setProperty('--red',cfg.redMain);if(cfg.cardRadius!==undefined)r.setProperty('--card-radius',cfg.cardRadius+'px');}
function dollar(v){const s=String(v||'').trim();return s.startsWith('$')?s:'$'+s;}
function showToast(){const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}

// Apply per-image config and rebuild keyframe
function applyImgCfg(cfg,i){
    const el=document.getElementById('cimg-e-'+i);
    if(!el)return;
    const ox=cfg.offsetX||0;
    el.style.bottom=cfg.bottom+'px';
    el.style.width=cfg.width+'px';
    // Update the keyframe so the float animation uses the new offsetX
    let kfEl=document.getElementById('kf-e-'+i);
    if(!kfEl){kfEl=document.createElement('style');kfEl.id='kf-e-'+i;document.head.appendChild(kfEl);}
    kfEl.textContent=`@keyframes float-${i}{0%,100%{transform:translateX(calc(-50% + ${ox}px)) translateY(0px);}50%{transform:translateX(calc(-50% + ${ox}px)) translateY(-9px);}}`;
    el.style.animationName='none';
    requestAnimationFrame(()=>{el.style.animationName='float-'+i;});
}

function buildGrid(items){
    const grid=document.getElementById('grid-estilos');
    grid.innerHTML='';
    items.forEach((item,i)=>{
        const img=item.img||FALLBACK_IMGS[i]||'';
        const cfg=imgCfg[i]||DEF_CFG[0];
        const ox=cfg.offsetX||0;
        // Create keyframe
        let kfEl=document.getElementById('kf-e-'+i);
        if(!kfEl){kfEl=document.createElement('style');kfEl.id='kf-e-'+i;document.head.appendChild(kfEl);}
        kfEl.textContent=`@keyframes float-${i}{0%,100%{transform:translateX(calc(-50% + ${ox}px)) translateY(0px);}50%{transform:translateX(calc(-50% + ${ox}px)) translateY(-9px);}}`;
        const div=document.createElement('div');
        div.className='card';div.id='card-e-'+i;
        div.innerHTML=`<img id="cimg-e-${i}" src="${img}" alt="" style="position:absolute;left:50%;bottom:${cfg.bottom}px;width:${cfg.width}px;object-fit:contain;filter:drop-shadow(0 18px 14px rgba(0,0,0,0.45));z-index:10;animation:float-${i} 13s ease-in-out infinite;transition:opacity 0.3s;" onerror="this.style.opacity='0'">
        <div class="card-box"><div class="c-name" id="cname-e-${i}">${item.nombre}</div><div class="c-sub" id="csub-e-${i}">${item.sub}</div><div class="c-price" id="cprice-e-${i}">${dollar(item.precio)}</div></div>`;
        grid.appendChild(div);
    });
}

function updateEstilos(items){
    const newKey=JSON.stringify(items.map(i=>[i.nombre,i.sub,i.precio,i.img]));
    if(!initialized){buildGrid(items);}
    else if(newKey!==lastKey){
        items.forEach((item,i)=>{
            const img=item.img||FALLBACK_IMGS[i]||'';
            const elImg=document.getElementById('cimg-e-'+i);
            const elN=document.getElementById('cname-e-'+i);
            const elS=document.getElementById('csub-e-'+i);
            const elP=document.getElementById('cprice-e-'+i);
            if(elImg&&elImg.getAttribute('src')!==img){elImg.src=img;elImg.style.opacity='1';}
            if(elN&&elN.textContent!==item.nombre)elN.textContent=item.nombre;
            if(elS&&elS.textContent!==item.sub)elS.textContent=item.sub;
            if(elP){const p=dollar(item.precio);if(elP.textContent!==p)elP.textContent=p;}
        });
        showToast();
    }
    lastKey=newKey;
}

function updateCarnes(items){
    const list=document.getElementById('list-carnes');
    const newKey=JSON.stringify(items.map(c=>[c.es,c.en]));
    if(!initialized){
        list.innerHTML='';
        items.forEach(c=>{const div=document.createElement('div');div.className='m-row';div.innerHTML=`<span class="m-name">${c.es}</span><span class="m-sub">${c.en}</span>`;list.appendChild(div);});
    }else if(newKey!==lastCarnesKey){
        const rows=list.querySelectorAll('.m-row');
        items.forEach((c,i)=>{if(rows[i]){rows[i].querySelector('.m-name').textContent=c.es;rows[i].querySelector('.m-sub').textContent=c.en;}});
    }
    lastCarnesKey=newKey;
}

// ── postMessage listener — receives live updates from admin iframe ──
window.addEventListener('message',(e)=>{
    const d=e.data;
    if(!d||d.source!=='emilios-admin')return;
    if(d.type==='imgCfgP1'&&d.cfg){
        imgCfg=d.cfg;
        localStorage.setItem('imgCfgP1',JSON.stringify(imgCfg));
        imgCfg.forEach((cfg,i)=>applyImgCfg(cfg,i));
    }
    if(d.type==='layoutP1'&&d.cfg){applyLayout(d.cfg);}
});

async function load(){
    try{
        const r=await fetch(APPS_SCRIPT_URL+'?t='+Date.now());
        const data=await r.json();
        applyLayout(data.layoutP1);
        if(data.titlesP1){
            const te=document.getElementById('title-en'),ts=document.getElementById('title-es'),me=document.getElementById('meat-title-en'),ms=document.getElementById('meat-title-es'),wp=document.getElementById('website-pill');
            if(te&&data.titlesP1.styleEn)te.textContent=data.titlesP1.styleEn;
            if(ts&&data.titlesP1.styleEs)ts.textContent=data.titlesP1.styleEs;
            if(me&&data.titlesP1.meatEn)me.innerHTML=data.titlesP1.meatEn;
            if(ms&&data.titlesP1.meatEs)ms.textContent=data.titlesP1.meatEs;
            if(wp&&data.titlesP1.website)wp.textContent=data.titlesP1.website;
        }
        if(data.imgCfgP1){imgCfg=data.imgCfgP1;localStorage.setItem('imgCfgP1',JSON.stringify(imgCfg));}
        updateEstilos(data.estilos||[]);
        updateCarnes(data.carnes||[]);
        initialized=true;
    }catch(e){console.warn(e);}
}
scaleRoot();window.addEventListener('resize',scaleRoot);load();setInterval(load,30000);
</script>
</body>
</html>
